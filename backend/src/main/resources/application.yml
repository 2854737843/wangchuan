spring:
  application:
    name: lab-collab
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lab_collab?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:LabCollabJwtSecretKeyForDevOnly_ChangeMe1234567890}
    expire-hours: 24
